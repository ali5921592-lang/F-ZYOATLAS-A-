name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Depoyu indir
        uses: actions/checkout@v4

      - name: Flutter Kur
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"

      - name: Flutter Sürümü
        run: flutter --version

      - name: Proje Klasörüne Gir
        run: cd fizyoatlas_ai

      - name: Paketleri Yükle
        run: |
          cd fizyoatlas_ai
          flutter pub get

      - name: Android Klasörünü Oluştur
        run: |
          cd fizyoatlas_ai
          flutter create .

      - name: APK Oluştur
        run: |
          cd fizyoatlas_ai
          flutter build apk --release

      - name: APK'yı Yükle
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: fizyoatlas_ai/build/app/outputs/flutter-apk/app-release.apk
